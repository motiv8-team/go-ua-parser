rules:
  - token: "AppleWebKit"
    engine: "WebKit"
    match: exact
  - token: "Gecko"
    engine: "Gecko"
    match: exact
  - token: "Trident"
    engine: "Trident"
    match: exact
  - token: "Presto"
    engine: "Presto"
    match: exact
  - token: "EdgeHTML"
    engine: "EdgeHTML"
    match: exact
  - token: "Blink"
    engine: "Blink"
    match: exact
  - token: "Goanna"
    engine: "Goanna"
    match: exact
  - token: "KHTML"
    engine: "KHTML"
    match: exact
  - token: "NetFront"
    engine: "NetFront"
    match: exact
  - token: "NetSurf"
    engine: "NetSurf"
    match: exact
  - token: "Servo"
    engine: "Servo"
    match: exact
  - token: "Flow"
    engine: "Flow"
    match: exact
  - token: "LibWeb"
    engine: "LibWeb"
    match: exact

  # === synced from upstream by tools/ua-sync (2026-07-23); review before commit ===
  - token: "xChaos_Arachne"
    engine: "Arachne"
    match: exact
  - token: "LibWeb+LibJs"
    engine: "LibWeb"
    match: exact
  - token: "ArkWeb"
    engine: "ArkWeb"
    match: exact
