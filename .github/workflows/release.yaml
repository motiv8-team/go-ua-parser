name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests before release
        run: go test ./... -race -count=1

      - name: Get current version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Parse semver components
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Determine version bump from commit messages since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:|^perf(\(.+\))?:"; then
            PATCH=$((PATCH + 1))
          else
            # No version-bumping commits — skip release
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version-bumping commits found. Skipping release."
            exit 0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumping from $LATEST_TAG to $NEW_TAG"

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true'
        id: notes
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest }}"
          NEW_TAG="${{ steps.version.outputs.new }}"

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            if [ "$LATEST_TAG" = "v0.0.0" ]; then
              git log --pretty=format:"- %s" | head -20
            else
              git log "$LATEST_TAG"..HEAD --pretty=format:"- %s"
            fi
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag ${{ steps.version.outputs.new }}
          git push origin ${{ steps.version.outputs.new }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new }}
          name: ${{ steps.version.outputs.new }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
